<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="本の世界に迷い込むような質問から、画像生成AI向けのオリジナルキャラクタープロンプトを作るツールです。">
  <title>本の世界転生オリキャラMaker</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./app.js" defer></script>
</head>
<body>
  <main class="app">
    <header class="hero">
      <a class="back-link" href="../">← トップに戻る</a>
      <p class="eyebrow">Promptmaker</p>
      <h1>本の世界転生オリキャラMaker</h1>
      <p>古い本を開いたら、物語の中で別の姿になる。そんな小さな転生演出から、自キャラPromptを組み立てます。</p>
    </header>

    <section class="panel quiz-panel" aria-label="本の世界に入る質問">
      <div class="quiz-head">
        <div>
          <h2>本を開く</h2>
          <p id="progress">0 / 9</p>
        </div>
        <button class="quiet" type="button" id="randomButton">おまかせ</button>
      </div>
      <form id="quizForm" autocomplete="off"></form>
    </section>

    <section class="panel result-panel" aria-label="生成結果">
      <div class="result-head">
        <div>
          <h2>完成Prompt</h2>
          <p id="characterTitle">まだ本は開かれていません。</p>
        </div>
        <button class="primary" type="button" id="copyButton" disabled>コピー</button>
      </div>
      <pre class="output" id="output" aria-live="polite"></pre>
    </section>
  </main>
</body>
</html>
